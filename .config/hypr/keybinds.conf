# Applications
bind = $mainMod, return, exec, $terminal
bind = $mainMod SHIFT, return, exec, [size 1158 648;float;center] $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, Q, exec, pkill wlogout || wlogout
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, W, exec, killall waybar || waybar &
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, V, togglefloating
bind = $mainMod, M, fullscreen, 1 
bind = $mainMod, F, fullscreen
bind = $mainMod, R, exec, pkill wofi || $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, SPACE, togglesplit, # dwindle
bind = $mainMod, period, exec, pkill wofi || ~/.config/wofi/scripts/wofi-emoji.sh
bind = $mainMod, W, exec, pkill wofi || ~/.config/hypr/scripts/wallpaper.sh
bind = $mainMod, N, exec, swaync-client -t -sw
bind =, XF86Favorites, exec, pkill kdeconnectd || kdeconnectd
bindl=, switch:Lid Switch, exec, hyprlock --immediate-render

# Screenshot Capture
bind =, PRINT, exec, hyprshot -m window -m active --clipboard-only -t 2000
bind = $mainMod, PRINT, exec, hyprshot -m window -m active -t 2000 -o ~/Pictures/Screenshots/ -f $(date +%F_%H-%M).png
bind = $mainMod CTRL, PRINT, exec, hyprshot -m region -t 2000 -o ~/Pictures/Screenshots/ -f $(date +%F_%H-%M).png
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m output -m active -t 2000 -o ~/Pictures/Screenshots/ -f $(date +%F_%H-%M).png

# Move focus with mainMod + vim keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Toggle focus between floating and tiling
bind = $mainMod, TAB, exec, hyprctl activewindow -j | jq -e '.floating' && hyprctl dispatch cyclenext tiled || hyprctl dispatch cyclenext floating

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace
bind = $mainMod, I, togglespecialworkspace, scratchpad
bind = $mainMod, E, togglespecialworkspace, filemanager
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Custom Bindings (Media)
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Custom Bindings (Audio)
# binde =, XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
# binde =, XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
# binde =, XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Custom Bindings (Swapping Windows)
bind = $mainMod SHIFT, h,  swapwindow, l
bind = $mainMod SHIFT, l, swapwindow, r
bind = $mainMod SHIFT, k,    swapwindow, u
bind = $mainMod SHIFT, j,  swapwindow, d

# Custom Bindings (Window Resizing)         X  Y
bind = $mainMod CTRL, h , resizeactive, -40 0
bind = $mainMod CTRL, l, resizeactive,  40 0
bind = $mainMod CTRL, k,    resizeactive,  0 -40 
bind = $mainMod CTRL, j,  resizeactive,  0 40
